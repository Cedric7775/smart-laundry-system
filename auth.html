<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Smart Laundry - Login</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
      }

      .auth-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 98vw;
        padding: 40px 2vw;
      }

      .auth-card h2 {
        margin-top: 0;
        margin-bottom: 30px;
        text-align: center;
        color: #333;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      .btn-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
      }

      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .toggle-form {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
      }

      .toggle-form a {
        color: #667eea;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
      }

      .toggle-form a:hover {
        text-decoration: underline;
      }

      .form-hidden {
        display: none;
      }

      .error-message {
        background-color: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: none;
      }

      .success-message {
        background-color: #efe;
        color: #3c3;
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: none;
      }

      .back-to-home {
        text-align: center;
        margin-top: 30px;
      }

      .back-to-home a {
        color: white;
        text-decoration: none;
        font-weight: 500;
      }

      .back-to-home a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container container">
      <nav class="navbar">
        <div class="logo">MyBooking</div>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="auth.html">Login</a>
        </div>
      </nav>
      <style>
        .navbar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
        }
        .nav-links {
          display: flex;
          flex-direction: row;
          list-style: none;
          padding: 0;
          margin: 0;
        }
        .nav-links a {
          margin: 0 10px;
        }
        @media (max-width: 768px) {
          .nav-links {
            flex-direction: column;
            width: 100%;
          }
        }
      </style>
      <div class="auth-card">
        <!-- Login Form -->
        <div id="loginForm" class="form-section">
          <h2>Welcome Back</h2>
          <div id="loginError" class="error-message"></div>

          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input
                type="email"
                id="login-email"
                placeholder="your@email.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="login-password">Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="btn-submit" id="loginBtn">
              Login
            </button>
          </form>

          <div class="toggle-form">
            Don't have an account?
            <a onclick="toggleForms()">Sign Up</a>
          </div>
        </div>

        <!-- Registration Form -->
        <div id="registerForm" class="form-section form-hidden">
          <h2>Create Account</h2>
          <div id="registerError" class="error-message"></div>
          <div id="registerSuccess" class="success-message"></div>

          <form onsubmit="handleRegister(event)">
            <div class="form-group">
              <label for="register-name">Full Name</label>
              <input
                type="text"
                id="register-name"
                placeholder="John Doe"
                required
              />
            </div>

            <div class="form-group">
              <label for="register-email">Email</label>
              <input
                type="email"
                id="register-email"
                placeholder="your@email.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="register-phone">Phone Number</label>
              <input
                type="tel"
                id="register-phone"
                placeholder="+254712345678"
                required
              />
            </div>

            <div class="form-group">
              <label for="register-password">Password</label>
              <input
                type="password"
                id="register-password"
                placeholder="At least 6 characters"
                minlength="6"
                required
              />
            </div>

            <button type="submit" class="btn-submit" id="registerBtn">
              Sign Up
            </button>
          </form>

          <div class="toggle-form">
            Already have an account?
            <a onclick="toggleForms()">Login</a>
          </div>
        </div>

        <div class="back-to-home">
          <a href="/">← Back to Home</a>
        </div>
      </div>
    </div>

    <script>
      const API_BASE_URL = "http://localhost:5000/api";

      function toggleForms() {
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        loginForm.classList.toggle("form-hidden");
        registerForm.classList.toggle("form-hidden");

        // Clear error messages
        document.getElementById("loginError").style.display = "none";
        document.getElementById("registerError").style.display = "none";
        document.getElementById("registerSuccess").style.display = "none";
      }

      function showError(elementId, message) {
        const errorEl = document.getElementById(elementId);
        errorEl.textContent = message;
        errorEl.style.display = "block";

        // Auto-hide after 5 seconds
        setTimeout(() => {
          errorEl.style.display = "none";
        }, 5000);
      }

      function showSuccess(message) {
        const successEl = document.getElementById("registerSuccess");
        successEl.textContent = message;
        successEl.style.display = "block";

        setTimeout(() => {
          successEl.style.display = "none";
        }, 5000);
      }

      async function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const loginBtn = document.getElementById("loginBtn");

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
          const response = await fetch(`${API_BASE_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            showError("loginError", data.error || "Login failed");
            return;
          }

          // Store token and user data
          localStorage.setItem("access_token", data.access_token);
          localStorage.setItem("user", JSON.stringify(data.user));

          alert(`✅ Welcome ${data.user.name}!`);
          window.location.href = "/dashboard.html";
        } catch (err) {
          showError("loginError", "Network error: " + err.message);
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = "Login";
        }
      }

      async function handleRegister(event) {
        event.preventDefault();

        const name = document.getElementById("register-name").value.trim();
        const email = document.getElementById("register-email").value.trim();
        const phone = document.getElementById("register-phone").value.trim();
        const password = document.getElementById("register-password").value;
        const registerBtn = document.getElementById("registerBtn");

        registerBtn.disabled = true;
        registerBtn.textContent = "Creating account...";

        try {
          const response = await fetch(`${API_BASE_URL}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, phone, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            showError("registerError", data.error || "Registration failed");
            return;
          }

          // Store token and user data
          localStorage.setItem("access_token", data.access_token);
          localStorage.setItem("user", JSON.stringify(data.user));

          showSuccess(
            "✅ Account created successfully! Redirecting to dashboard...",
          );

          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 1500);
        } catch (err) {
          showError("registerError", "Network error: " + err.message);
        } finally {
          registerBtn.disabled = false;
          registerBtn.textContent = "Sign Up";
        }
      }
    </script>
  </body>
</html>
